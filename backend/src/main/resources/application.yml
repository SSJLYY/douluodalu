# ==================== 服务器配置 ====================
server:
  port: 8080

# ==================== 数据库配置 ====================
spring:
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/douluo_game?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8&rewriteBatchedStatements=true&connectTimeout=5000&socketTimeout=30000
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 5000
      idle-timeout: 300000
      max-lifetime: 1800000
      leak-detection-threshold: 60000
      connection-test-query: SELECT 1
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

# ==================== JWT配置 ====================
jwt:
  secret: douluodalu-game-secret-key-must-be-at-least-256-bits-long-for-hs256
  expiration: 86400000
  blacklist:
    expiration: 3600000  # 黑名单过期时间（1小时），防止已注销token过期后黑名单无限增长

# ==================== 游戏配置 ====================
game:
  offline:
    max-hours: 12
    efficiency: 0.8
