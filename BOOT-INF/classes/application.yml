# ==================== 服务器配置 ====================
server:
  port: 8080

# ==================== 数据库配置 ====================
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/douluo_game?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=utf8
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

# ==================== JWT配置 ====================
jwt:
  secret: douluodalu-game-secret-key-must-be-at-least-256-bits-long-for-hs256
  expiration: 86400000

# ==================== 游戏配置 ====================
game:
  offline:
    max-hours: 12
    efficiency: 0.8
